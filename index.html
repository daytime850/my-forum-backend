<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客学习论坛 - 图片增强版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 🔑 配置区域 ---
        const API_URL = "https://my-forum-backend-production.up.railway.app"; 
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxhyzyqzl/image/upload"; // 已根据你的截图填写
        const UPLOAD_PRESET = "my_preset_123"; // 已根据你的截图填写

        function App() {
            const [posts, setPosts] = useState([]);
            const [userScore, setUserScore] = useState(0);
            const [newPost, setNewPost] = useState({ title: '', content: '' });
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);

            // 页面加载时抓取帖子
            useEffect(() => { fetchPosts(); }, []);

            async function fetchPosts() {
                try {
                    const res = await fetch(`${API_URL}/posts`);
                    const data = await res.json();
                    setPosts(data);
                } catch (e) { console.error("加载失败", e); }
                finally { setLoading(false); }
            }

            const handlePublish = async () => {
                if(!newPost.title || !newPost.content) return alert("请填写内容");
                
                setUploading(true);
                let imageUrl = "";

                // 1. 处理图片上传到 Cloudinary
                const fileInput = document.getElementById('imageInput');
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    try {
                        const cloudRes = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                        const cloudData = await cloudRes.json();
                        imageUrl = cloudData.secure_url; // 获取上传后的图片永久链接
                    } catch (e) {
                        alert("图片上传失败，请检查 Cloudinary 设置");
                        setUploading(false);
                        return;
                    }
                }

                // 2. 将数据提交到 Railway 后端
                try {
                    const response = await fetch(`${API_URL}/posts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...newPost, image_url: imageUrl })
                    });

                    if(response.ok) {
                        setNewPost({ title: '', content: '' });
                        fileInput.value = ""; 
                        setUserScore(s => s + 5);
                        await fetchPosts(); // 刷新列表
                        alert("发布成功！积分 +5");
                    }
                } catch (e) { alert("发布失败"); }
                finally { setUploading(false); }
            };

            return (
                <div className="min-h-screen">
                    {/* 导航栏 */}
                    <nav className="bg-white shadow-sm border-b px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                        <h1 className="text-2xl font-bold text-blue-600">GeekForum</h1>
                        <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">我的积分: {userScore}</span>
                    </nav>

                    <main className="max-w-6xl mx-auto mt-8 grid grid-cols-12 gap-6 px-4 pb-20">
                        {/* 左侧：发帖与列表 */}
                        <div className="col-span-12 lg:col-span-8 space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h2 className="text-lg font-bold mb-4">发布讨论</h2>
                                <input className="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="标题" value={newPost.title} onChange={e => setNewPost({...newPost, title: e.target.value})} />
                                <textarea className="w-full p-3 border rounded-lg h-32 mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="内容" value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} />
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">上传图片 (可选)</label>
                                    <input type="file" id="imageInput" accept="image/*" className="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                                </div>

                                <button onClick={handlePublish} disabled={uploading} className="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold disabled:bg-gray-400">
                                    {uploading ? "正在上传..." : "立即发布"}
                                </button>
                            </div>

                            <div className="space-y-4">
                                {loading ? <p className="text-center">加载中...</p> : posts.map(post => (
                                    <div key={post.id} className="bg-white p-6 rounded-xl shadow-sm border">
                                        <h3 className="text-xl font-bold mb-2">{post.title}</h3>
                                        <p className="text-gray-600 mb-4 whitespace-pre-wrap">{post.content}</p>
                                        {post.image_url && <img src={post.image_url} className="rounded-lg max-h-96 w-auto mb-4 border shadow-sm" />}
                                        <div className="text-xs text-gray-400">发布于: {new Date(post.created_at).toLocaleString()}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 右侧：排行榜 */}
                        <div className="col-span-12 lg:col-span-4 space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">🏆 学霸排行榜</h2>
                                <div className="space-y-4">
                                    {[
                                        {name: '爱因斯坦', xp: 2940},
                                        {name: '居里夫人', xp: 2510},
                                        {name: '你', xp: userScore}
                                    ].map((user, i) => (
                                        <div key={i} className="flex justify-between items-center">
                                            <span className="text-gray-700">{i+1}. {user.name}</span>
                                            <span className="font-mono font-bold text-blue-600">{user.xp} pts</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
