<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客论坛 - 终极修复版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 核心配置 ---
        const API_URL = "https://my-forum-backend-production.up.railway.app"; 
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxhyzyqzl/image/upload"; 
        const UPLOAD_PRESET = "my_preset_123"; 

        function App() {
            const [posts, setPosts] = useState([]);
            const [newPost, setNewPost] = useState({ title: '', content: '' });
            const [uploading, setUploading] = useState(false);

            const fetchPosts = async () => {
                try {
                    const res = await fetch(`${API_URL}/posts`);
                    const data = await res.json();
                    setPosts(data);
                } catch (e) { console.error("加载失败", e); }
            };

            useEffect(() => { fetchPosts(); }, []);

            const handlePublish = async () => {
                if(!newPost.title || !newPost.content) return alert("标题和内容不能为空");
                setUploading(true);
                
                let imageUrl = "";
                const fileInput = document.getElementById('imageInput');

                // 1. 上传图片到 Cloudinary
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    try {
                        const cloudRes = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                        const cloudData = await cloudRes.json();
                        imageUrl = cloudData.secure_url;
                        console.log("图片上传成功:", imageUrl);
                    } catch (e) {
                        alert("图片传给云端失败了");
                    }
                }

                // 2. 发送到你的 Railway 后端
                try {
                    const res = await fetch(`${API_URL}/posts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...newPost, image_url: imageUrl })
                    });
                    if(res.ok) {
                        alert("发布成功！");
                        setNewPost({ title: '', content: '' });
                        fileInput.value = "";
                        fetchPosts();
                    }
                } catch (e) {
                    alert("发送到后端失败");
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="max-w-2xl mx-auto p-4">
                    <div className="bg-white p-6 rounded-lg shadow-md mb-8">
                        <h2 className="text-xl font-bold mb-4">📢 发帖讨论</h2>
                        <input className="w-full border p-2 mb-4 rounded" placeholder="输入标题" value={newPost.title} onChange={e=>setNewPost({...newPost, title:e.target.value})} />
                        <textarea className="w-full border p-2 mb-4 rounded h-24" placeholder="内容..." value={newPost.content} onChange={e=>setNewPost({...newPost, content:e.target.value})} />
                        <input type="file" id="imageInput" className="mb-4 block w-full text-sm" />
                        <button onClick={handlePublish} disabled={uploading} className="w-full bg-blue-600 text-white py-2 rounded font-bold">
                            {uploading ? "正在努力上传..." : "立即发布"}
                        </button>
                    </div>

                    <div className="space-y-6">
                        {posts.map(post => (
                            <div key={post.id} className="bg-white p-6 rounded-lg shadow">
                                <h3 className="text-lg font-bold">{post.title}</h3>
                                <p className="text-gray-600 my-4 whitespace-pre-wrap">{post.content}</p>
                                
                                {/* 图片显示逻辑：关键修正 */}
                                {post.image_url && (
                                    <div className="mt-4 border rounded overflow-hidden bg-gray-50">
                                        <img src={post.image_url} className="max-w-full h-auto mx-auto" alt="帖子图片" />
                                    </div>
                                )}
                                
                                <div className="mt-4 text-xs text-gray-400 pt-4 border-t">
                                    ID: {post.id} | 时间: {post.created_at ? new Date(post.created_at).toLocaleString() : '刚刚'}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
