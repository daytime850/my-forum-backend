<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客学习论坛 - 调试版</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 配置 ---
        const API_URL = "https://my-forum-backend-production.up.railway.app"; 
        const CLOUD_NAME = "dxhyzyqzl";
        const PRESET = "my_preset_123";

        function App() {
            const [posts, setPosts] = useState([]);
            const [newPost, setNewPost] = useState({ title: '', content: '' });
            const [uploading, setUploading] = useState(false);

            const fetchPosts = async () => {
                const res = await fetch(`${API_URL}/posts`);
                const data = await res.json();
                setPosts(data);
            };

            useEffect(() => { fetchPosts(); }, []);

            const handlePublish = async () => {
                if(!newPost.title || !newPost.content) return alert("请填写内容");
                setUploading(true);
                
                let finalImageUrl = "";
                const fileInput = document.getElementById('imageInput');

                // 1. 尝试上传到 Cloudinary
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('upload_preset', PRESET);

                    try {
                        const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                            method: 'POST',
                            body: formData
                        });
                        const cloudData = await cloudRes.json();
                        if(cloudData.secure_url) {
                            finalImageUrl = cloudData.secure_url;
                            console.log("图片上传成功:", finalImageUrl);
                        } else {
                            alert("Cloudinary 报错: " + cloudData.error.message);
                        }
                    } catch (e) {
                        alert("网络请求失败，请检查 Cloudinary 配置");
                    }
                }

                // 2. 提交到后端
                try {
                    const response = await fetch(`${API_URL}/posts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...newPost, image_url: finalImageUrl })
                    });
                    if(response.ok) {
                        alert("发布成功！");
                        location.reload();
                    } else {
                        const errorText = await response.text();
                        alert("服务器报错: " + errorText);
                    }
                } catch (e) {
                    alert("无法连接到 Railway 后端");
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="max-w-2xl mx-auto py-10 px-4">
                    <div className="bg-white p-6 rounded-xl shadow mb-8">
                        <h2 className="font-bold mb-4 text-xl text-blue-600">发布新动态</h2>
                        <input className="w-full border p-2 mb-4 rounded" placeholder="标题" value={newPost.title} onChange={e=>setNewPost({...newPost, title:e.target.value})}/>
                        <textarea className="w-full border p-2 mb-4 rounded h-24" placeholder="内容" value={newPost.content} onChange={e=>setNewPost({...newPost, content:e.target.value})}/>
                        <input type="file" id="imageInput" className="mb-4 block w-full text-sm text-gray-500" />
                        <button onClick={handlePublish} disabled={uploading} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold w-full">
                            {uploading ? "正在处理..." : "发布"}
                        </button>
                    </div>

                    <div className="space-y-4">
                        {posts.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded-lg shadow">
                                <h3 className="font-bold text-lg">{p.title}</h3>
                                <p className="text-gray-600 my-2">{p.content}</p>
                                {p.image_url && <img src={p.image_url} className="rounded-lg max-h-80 w-auto border mb-2" />}
                                <div className="text-xs text-gray-400">ID: {p.id}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
